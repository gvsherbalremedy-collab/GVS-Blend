<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVS Builder Bridge</title>
    <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-4xl mx-auto p-8">
        <header class="mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-green-700">GVS Builder Bridge</h1>
            <p class="text-sm text-gray-500">Managing your custom herbal blends and Shopify variants.</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold mb-2">Sync Status</h3>
                <div class="flex items-center text-green-600">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                    Connected to Shopify
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h3 class="font-bold mb-2">Quick Actions</h3>
                <button class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition">
                    Refresh Variant List
                </button>
            </div>
        </main>

        <section class="mt-10">
            <h3 class="text-lg font-bold mb-4">Active Custom Blends</h3>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">Blend Name</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b">
                            <td class="p-4">Lion's Mane Dual Extract</td>
                            <td class="p-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs">Active</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // Initialize Shopify App Bridge
        const AppBridge = window['app-bridge'];
        const createApp = AppBridge.default;
        const app = createApp({
            apiKey: "YOUR_SHOPIFY_API_KEY", // This connects to your Shopify App settings
            host: new URLSearchParams(location.search).get("host"),
            forceRedirect: true
        });
    </script>
</body>
</html>
